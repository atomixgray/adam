<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <title>Parlo - Learn Italian</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container">
        <header>
            <h1>Parlo</h1>
            <p class="subtitle">Learn Italian, one step at a time</p>
        </header>

        <div class="mode-cards">
            <a href="flashcards.html" class="mode-card">
                <div class="mode-card__icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                </div>
                <div>
                    <div class="mode-card__title">Flashcards</div>
                    <div class="mode-card__desc">Learn vocabulary and phrases with flip cards and audio pronunciation</div>
                </div>
            </a>

            <a href="conversation.html" class="mode-card mode-card--conversation">
                <div class="mode-card__icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div>
                    <div class="mode-card__title">Conversation</div>
                    <div class="mode-card__desc">Speak Italian on the spot with timed AI conversation partners</div>
                </div>
            </a>

            <a href="practice.html" class="mode-card mode-card--practice">
                <div class="mode-card__icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                </div>
                <div>
                    <div class="mode-card__title">Practice</div>
                    <div class="mode-card__desc">Build Italian sentences with AI-powered feedback on your writing</div>
                </div>
            </a>
        </div>

        <footer>
            <a href="/" class="back-link">← Back to adamlarkin.com</a>
        </footer>
    </div>

    <script src="particles.js"></script>
</body>
</html>
